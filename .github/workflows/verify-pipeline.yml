name: Windows Gem Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ruby-3-1:
    name: ":windows: Ruby 3.1 - Build Gems"
    runs-on: windows-2019
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby 3.1
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
      - name: Build Gems
        run: .\.expeditor\build_gems.ps1
        shell: pwsh

  build-ruby-3-4:
    name: ":windows: Ruby 3.4 - Build Gems"
    runs-on: windows-2019
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
      - name: Build Gems
        run: .\.expeditor\build_gems.ps1
        shell: pwsh

  check-ruby-version:
    name: ":windows: Check Ruby Version"
    runs-on: windows-2019
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
      - name: Check Ruby Version
        run: |
          Get-Command ruby
          ruby --version
        shell: pwsh
